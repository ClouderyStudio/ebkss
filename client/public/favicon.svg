<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Book shape -->
  <path d="M16 18 L16 46 C16 48 18 48 20 46 L20 18 Z" fill="white" opacity="0.9"/>
  <path d="M20 18 L44 18 L44 46 C44 48 42 48 40 46 Z" fill="white"/>
  <path d="M44 18 L48 18 L48 46 C48 48 46 48 44 46 Z" fill="white" opacity="0.9"/>
  <line x1="20" y1="18" x2="44" y2="18" stroke="url(#accent)" stroke-width="2"/>

  <!-- E letter -->
  <text x="22" y="39" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">E</text>

  <!-- N letter with accent color -->
  <text x="36" y="39" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed">N</text>

  <!-- Small sparkle -->
  <circle cx="50" cy="14" r="3" fill="url(#accent)" opacity="0.9"/>
</svg>
